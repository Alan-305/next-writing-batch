# Cloud Build → Artifact Registry → Cloud Run
# 使い方: gcloud builds submit --config=cloudbuild.yaml .
# 置換例: gcloud builds submit --config=cloudbuild.yaml . \
#   --substitutions=_SERVICE_NAME=next-writing-batch,_REGION=asia-northeast1,_REPO=next-writing-batch
substitutions:
  _SERVICE_NAME: next-writing-batch
  _REGION: asia-northeast1
  _REPO: next-writing-batch

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:$BUILD_ID
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:$BUILD_ID

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --port=8080
      - --memory=2Gi
      - --cpu=2
      - --timeout=900
      - --max-instances=1
      - --min-instances=0
      - --allow-unauthenticated
      - --quiet

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:$BUILD_ID
